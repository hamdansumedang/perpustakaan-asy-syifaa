version: '3.8'

services:
  # MongoDB Database
  mongo:
    image: mongo:5.0
    container_name: asy-syifaa-mongo
    environment:
      MONGO_INITDB_DATABASE: asy-syifaa-library
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    ports:
      - "27017:27017"
    restart: unless-stopped
    networks:
      - asy-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asy-syifaa-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      BASE_URL: http://localhost:5000
      MONGODB_URI: mongodb://admin:password123@mongo:27017/asy-syifaa-library?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this}
      JWT_EXPIRE: 7d
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: bismillah
      ADMIN_EMAIL: admin@asy-syifaa.com
      CORS_ORIGIN: http://localhost:3000,http://localhost
      MAX_FILE_SIZE: 52428800
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped
    networks:
      - asy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/categories"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: asy-syifaa-frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      REACT_APP_API_URL: http://backend:5000/api
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - asy-network
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local

networks:
  asy-network:
    driver: bridge
